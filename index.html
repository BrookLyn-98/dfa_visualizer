<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draggable Automaton Visualizer</title>
<script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #0b1220;
        color: white;
        font-family: sans-serif;
    }
    #network-container {
        width: 100vw;
        height: 100vh;
    }
    .header {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 10;
        background: rgba(11, 18, 32, 0.8);
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #1f2f4a;
    }
</style>
</head>
<body>

<div class="header">
    <h3>Draggable Automaton</h3>
    <p>Click and drag any node. It just works!</p>
</div>

<div id="network-container"></div>

<script type="text/javascript">
    // 1. Define your States (Nodes)
    const nodes = new vis.DataSet([
        { id: 'q0', label: 'q0', shape: 'circle', color: { background: '#112039', border: '#38bdf8' }, font: { color: 'white', size: 18 } },
        { id: 'q1', label: 'q1', shape: 'circle', color: { background: '#112039', border: '#38bdf8' }, font: { color: 'white', size: 18 } },
        { id: 'q2', label: 'q2', shape: 'circle', color: { background: '#112039', border: '#34d399', borderWidth: 3 }, font: { color: 'white', size: 18 } } // Example of an accepted state
    ]);

    // 2. Define your Transitions (Edges)
    const edges = new vis.DataSet([
        { from: 'q0', to: 'q1', label: 'a', arrows: 'to', color: '#38bdf8', font: { color: '#7dd3fc', align: 'top' } },
        { from: 'q1', to: 'q0', label: 'b', arrows: 'to', color: '#38bdf8', font: { color: '#7dd3fc', align: 'top' } },
        { from: 'q1', to: 'q2', label: 'a', arrows: 'to', color: '#38bdf8', font: { color: '#7dd3fc', align: 'top' } },
        // Example of a self-loop
        { from: 'q2', to: 'q2', label: 'a, b', arrows: 'to', color: '#38bdf8', font: { color: '#7dd3fc', align: 'top' } } 
    ]);

    // 3. Connect everything to your HTML
    const container = document.getElementById('network-container');
    const data = { nodes: nodes, edges: edges };
    
    // 4. Configure the rules of the diagram
    const options = {
        physics: false, // Set to true if you want them to bounce around magnetically
        interaction: {
            dragNodes: true, // This enables the flawless drag-and-drop
            zoomView: true,
            dragView: true
        },
        edges: {
            smooth: {
                type: 'curvedCW', // Makes the lines curve nicely around each other
                roundness: 0.2
            }
        }
    };

    // Initialize the network
    const network = new vis.Network(container, data, options);
</script>

</body>
</html>
